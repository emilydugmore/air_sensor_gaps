<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
    <style>
        body {
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: #07090f;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #map-container {
            width: calc(100vw - 6vw);
            height: calc(100vh - 12vh);
            margin-top: 4vh;
            border: 4px solid #000000;
            position: relative;
            overflow: hidden;
        }

        #map { width: 100%; height: 100%; }
        .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
    </style>
</head>
<body>
<div id="map-container">
    <div id="map"></div>
</div>

<script>
    const TOKEN = 'pk.eyJ1IjoiZW1pbHlkdWdtb3JlIiwiYSI6ImNta285NjZiZzAzMzQza3M5ZmRodHp6ZDcifQ.geVyLy4fYjBWRAGJSbwN-g';
    mapboxgl.accessToken = TOKEN;

    // Africa country codes extracted from africa.geojson (C_abb property)
    const AFRICA_CODES = [
        '111',
        'AGO','BDI','BEN','BFA','BWA','CAF','CIV','CMR','COD','COG','COM','CPV',
        'DJI','DZA','EGY','ERI','ESH','ETH','GAB','GHA','GIN','GMB','GNB','GNQ',
        'KEN','LBR','LBY','LSO','MAR','MDG','MLI','MOZ','MRT','MWI','NAM','NER',
        'NGA','RWA','SDN','SEN','SLE','SOM','SSD','STP','SWZ','SYC','TCD','TGO',
        'TUN','TZA','UGA','ZAF','ZMB','ZWE'
    ];

    // Korea bounds (pre-calculated from the two country polygons)
    const KOREA_BOUNDS = [[124.2, 33.19], [130.93, 43.01]];

    // Chicago PM2.5 choropleth bounds
    const CHICAGO_BOUNDS = [[-87.9599, 41.6443], [-87.5237, 42.0252]];

    function deriveBounds(geometry) {
        const rings = geometry.type === 'Polygon'
            ? geometry.coordinates
            : geometry.coordinates.flat(1);
        let minLng = Infinity, minLat = Infinity, maxLng = -Infinity, maxLat = -Infinity;
        for (const ring of rings) {
            for (const [lng, lat] of ring) {
                if (lng < minLng) minLng = lng;
                if (lat < minLat) minLat = lat;
                if (lng > maxLng) maxLng = lng;
                if (lat > maxLat) maxLat = lat;
            }
        }
        return [[minLng, minLat], [maxLng, maxLat]];
    }

    const chicagoReady = fetch('./data/chicago.geojson')
        .then(r => r.json())
        .then(data => data.features[0].geometry);

    const africaReady = fetch('./data/africa_simple.geojson')
        .then(r => r.json())
        .then(data => data.features[0].geometry);

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/emilydugmore/cmneoxtrw003a01r11o2c6f7f',
        center: [15, 20],
        zoom: 1.8,
        projection: 'mercator'
    });

    let mapLoaded = false;
    let pendingTopic = null;
    let currentTopic = null;

    map.on('load', () => {
        mapLoaded = true;
        map.setFog(null);

        // ── Country fill — flat dark shading for all countries ───────────
        map.addSource('countries', {
            type: 'vector',
            url: 'mapbox://emilydugmore.48mjdbxk'
        });

        map.addLayer({
            id: 'country-fill',
            type: 'fill',
            slot: 'middle',
            source: 'countries',
            'source-layer': 'country_data',
            paint: {
                'fill-color': 'rgba(255, 255, 255, 0.07)',
                'fill-emissive-strength': 0.6
            }
        });

        map.addLayer({
            id: 'country-outline',
            type: 'line',
            slot: 'middle',
            source: 'countries',
            'source-layer': 'country_data',
            paint: {
                'line-color': 'rgba(255, 255, 255, 0.18)',
                'line-emissive-strength': 1,
                'line-width': 0.5
            }
        });

        // ── Africa highlight — shown only for economic topic ──────────────
        map.addLayer({
            id: 'africa-highlight',
            type: 'fill',
            slot: 'middle',
            source: 'countries',
            'source-layer': 'country_data',
            filter: ['in', ['get', 'C_abb'], ['literal', AFRICA_CODES]],
            layout: { 'visibility': 'none' },
            paint: {
                'fill-color': 'rgba(251, 146, 60, 0.35)',
                'fill-emissive-strength': 0.7
            }
        });

        // ── Korea highlight — shown only for political topic ──────────────
        map.addLayer({
            id: 'korea-highlight',
            type: 'fill',
            slot: 'middle',
            source: 'countries',
            'source-layer': 'country_data',
            filter: ['in', ['get', 'C_abb'], ['literal', ['KOR', 'PRK']]],
            layout: { 'visibility': 'none' },
            paint: {
                'fill-color': 'rgba(251, 146, 60, 0.35)',
                'fill-emissive-strength': 0.7
            }
        });

        // ── Chicago PM2.5 choropleth — shown only for policy topic ───────────────
        map.addSource('chicago-pm25', {
            type: 'vector',
            url: 'mapbox://emilydugmore.1vpkw6qq'
        });

        map.addLayer({
            id: 'chicago-highlight',
            type: 'fill',
            slot: 'middle',
            source: 'chicago-pm25',
            'source-layer': 'chicago_PM25-4u8b7q',
            layout: { 'visibility': 'none' },
            paint: {
                'fill-color': [
                    'interpolate', ['linear'], ['get', 'pm_25'],
                    8.6,  '#fef9c3',
                    9.0,  '#fbbf24',
                    9.4,  '#f97316',
                    9.756,'#dc2626'
                ],
                'fill-opacity': 0.8,
                'fill-emissive-strength': 0.7
            }
        });

        map.addLayer({
            id: 'chicago-outline',
            type: 'line',
            slot: 'middle',
            source: 'chicago-pm25',
            'source-layer': 'chicago_PM25-4u8b7q',
            layout: { 'visibility': 'none' },
            paint: {
                'line-color': '#000000',
                'line-width': 1,
                'line-emissive-strength': 1
            }
        });

        // ── All sensor dots (global) ──────────────────────────────────────
        map.addSource('sensors', {
            type: 'vector',
            url: 'mapbox://emilydugmore.96ka7gjb'
        });

        map.addLayer({
            id: 'sensor-dots',
            type: 'circle',
            slot: 'middle',
            source: 'sensors',
            'source-layer': 'AQICN_sensors-5r58jr',
            paint: {
                'circle-emissive-strength': 1,
                'circle-radius': 3,
                'circle-color': '#1d4ed8',
                'circle-stroke-width': 1.5,
                'circle-stroke-color': '#ffffff'
            }
        });

        // ── Korea-only sensors (pre-filtered GeoJSON) ─────────────────────
        map.addSource('korea-sensors', {
            type: 'geojson',
            data: './data/korea_sensors.geojson'
        });

        map.addLayer({
            id: 'korea-sensor-dots',
            type: 'circle',
            slot: 'middle',
            source: 'korea-sensors',
            layout: { 'visibility': 'none' },
            paint: {
                'circle-emissive-strength': 1,
                'circle-radius': 3,
                'circle-color': '#1d4ed8',
                'circle-stroke-width': 1.5,
                'circle-stroke-color': '#ffffff'
            }
        });

        // ── Pre-filter Chicago + Africa sensor layers in the background ────
        // Baking ['within'] into the layer at load time means applyTopic only
        // needs a visibility toggle — no per-click filter evaluation.
        const SENSOR_PAINT = {
            'circle-emissive-strength': 1,
            'circle-radius': 3,
            'circle-color': '#1d4ed8',
            'circle-stroke-width': 1.5,
            'circle-stroke-color': '#ffffff'
        };

        chicagoReady.then(geometry => {
            map.addLayer({
                id: 'chicago-sensor-dots',
                type: 'circle',
                slot: 'middle',
                source: 'sensors',
                'source-layer': 'AQICN_sensors-5r58jr',
                filter: ['within', geometry],
                layout: { 'visibility': 'none' },
                paint: SENSOR_PAINT
            });
            if (currentTopic === 'policy') {
                map.setLayoutProperty('chicago-sensor-dots', 'visibility', 'visible');
                map.setLayoutProperty('sensor-dots', 'visibility', 'none');
            }
        });

        africaReady.then(geometry => {
            map.addLayer({
                id: 'africa-sensor-dots',
                type: 'circle',
                slot: 'middle',
                source: 'sensors',
                'source-layer': 'AQICN_sensors-5r58jr',
                filter: ['within', geometry],
                layout: { 'visibility': 'none' },
                paint: SENSOR_PAINT
            });
            if (currentTopic === 'economic') {
                map.setLayoutProperty('africa-sensor-dots', 'visibility', 'visible');
                map.setLayoutProperty('sensor-dots', 'visibility', 'none');
            }
        });

        // Apply any topic click that arrived before the map finished loading
        if (pendingTopic) applyTopic(pendingTopic);
    });

    function applyTopic(topic) {
        currentTopic = topic;

        // Reset all layers to default state
        map.setLayoutProperty('sensor-dots', 'visibility', 'visible');
        map.setLayoutProperty('korea-sensor-dots', 'visibility', 'none');
        map.setLayoutProperty('korea-highlight', 'visibility', 'none');
        map.setLayoutProperty('chicago-highlight', 'visibility', 'none');
        map.setLayoutProperty('chicago-outline', 'visibility', 'none');
        map.setLayoutProperty('africa-highlight', 'visibility', 'none');
        if (map.getLayer('chicago-sensor-dots')) map.setLayoutProperty('chicago-sensor-dots', 'visibility', 'none');
        if (map.getLayer('africa-sensor-dots'))  map.setLayoutProperty('africa-sensor-dots',  'visibility', 'none');

        if (topic === 'political') {
            map.setLayoutProperty('sensor-dots', 'visibility', 'none');
            map.setLayoutProperty('korea-sensor-dots', 'visibility', 'visible');
            map.setLayoutProperty('korea-highlight', 'visibility', 'visible');
            map.fitBounds(KOREA_BOUNDS, { padding: 80, duration: 3000, maxZoom: 8 });

        } else if (topic === 'policy') {
            map.setLayoutProperty('chicago-highlight', 'visibility', 'visible');
            map.setLayoutProperty('chicago-outline', 'visibility', 'visible');
            map.fitBounds(CHICAGO_BOUNDS, { padding: 20, duration: 3000, maxZoom: 14 });
            if (map.getLayer('chicago-sensor-dots')) {
                map.setLayoutProperty('sensor-dots', 'visibility', 'none');
                map.setLayoutProperty('chicago-sensor-dots', 'visibility', 'visible');
            }

        } else if (topic === 'economic') {
            map.setLayoutProperty('africa-highlight', 'visibility', 'visible');
            map.fitBounds([[-18, -35], [52, 38]], { padding: 80, duration: 3000, maxZoom: 6 });
            if (map.getLayer('africa-sensor-dots')) {
                map.setLayoutProperty('sensor-dots', 'visibility', 'none');
                map.setLayoutProperty('africa-sensor-dots', 'visibility', 'visible');
            }
        }
    }

    // ── Listen for topic button clicks from the parent page ───────────────
    window.addEventListener('message', (e) => {
        if (e.data.action !== 'flyTo') return;
        const topic = e.data.topic;
        if (!mapLoaded) { pendingTopic = topic; return; }
        applyTopic(topic);
    });
</script>
</body>
</html>
