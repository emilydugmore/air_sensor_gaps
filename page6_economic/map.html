<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const TOKEN = 'pk.eyJ1IjoiZW1pbHlkdWdtb3JlIiwiYSI6ImNta285NjZiZzAzMzQza3M5ZmRodHp6ZDcifQ.geVyLy4fYjBWRAGJSbwN-g';
        mapboxgl.accessToken = TOKEN;

        const POP_COLOR = [
            'interpolate', ['linear'], ['raster-value'],
            0,      'rgba(0,0,0,0)',
            0.2667, '#f4fbf3', 0.3961, '#f4fbf3',
            0.4,    '#d9f2e5', 0.5137, '#d9f2e5',
            0.5176, '#a8e3e6', 0.5961, '#a8e3e6',
            0.6,    '#71c7d8', 0.6549, '#71c7d8',
            0.6588, '#428bcc', 0.7059, '#428bcc',
            0.7098, '#356bb4', 0.7451, '#356bb4',
            0.7490, '#2b4da0', 0.7686, '#2b4da0',
            0.7725, '#28309f', 0.7961, '#28309f',
            0.8,    '#521f8b', 0.8118, '#521f8b',
            0.8157, '#700180', 0.8353, '#700180',
            0.8392, '#9a0049', 0.8627, '#9a0049',
            0.8667, '#cc003d', 0.8902, '#cc003d',
            0.8941, '#ef0405', 0.9333, '#ef0405',
            0.9373, '#f16206', 0.9686, '#f16206',
            0.9725, '#f39e03', 0.9922, '#f39e03',
            0.9961, '#f5c402', 1.0,   '#f5c402'
        ];

        const VIEWS = {
            political:  { center: [127.5, 37.5], zoom: 5.5 },
            policy:     { center: [-87.6, 41.9], zoom: 8.5 },
            economic:   { center: [20,    2   ], zoom: 3.2 }
        };

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/emilydugmore/cmneoxtrw003a01r11o2c6f7f',
            center: [15, 20],
            zoom: 1.8,
            projection: 'mercator'
        });

        map.on('load', () => {
            map.setFog(null);

            // ── World population raster ──────────────────────────────────────
            map.addSource('pop', {
                type: 'raster',
                tiles: [`https://api.mapbox.com/v4/emilydugmore.2k3zq36w/{z}/{x}/{y}.jpg?access_token=${TOKEN}`],
                tileSize: 256
            });
            map.addLayer({
                id: 'pop-layer',
                type: 'raster',
                slot: 'bottom',
                source: 'pop',
                paint: {
                    'raster-emissive-strength': 1,
                    'raster-opacity': 0.5,
                    'raster-color': POP_COLOR
                }
            });

            // ── Air quality sensors ──────────────────────────────────────────
            map.addSource('sensors', { type: 'vector', url: 'mapbox://emilydugmore.96ka7gjb' });
            map.addLayer({
                id: 'sensor-dots',
                type: 'circle',
                slot: 'top',
                source: 'sensors',
                'source-layer': 'AQICN_sensors-5r58jr',
                paint: {
                    'circle-emissive-strength': 1,
                    'circle-radius': 5,
                    'circle-color': '#1d4ed8',
                    'circle-stroke-width': 1.5,
                    'circle-stroke-color': '#ffffff'
                }
            });
        });

        // ── Respond to topic selection from parent sidebar ───────────────────
        window.addEventListener('message', (e) => {
            if (e.data.action === 'flyTo' && VIEWS[e.data.topic]) {
                map.flyTo({ ...VIEWS[e.data.topic], duration: 2200, speed: 0.85, curve: 1.4 });
            } else if (e.data.action === 'resetView') {
                map.flyTo({ center: [15, 20], zoom: 1.8, duration: 1800 });
            }
        });
    </script>
</body>
</html>
