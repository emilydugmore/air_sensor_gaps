<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     #07090f;
            --text:   #e2e8f0;
            --accent: #38bdf8;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 100vw; height: 100vh;
            background:
                radial-gradient(ellipse 80% 60% at 50% 50%, rgba(56,189,248,0.06) 0%, transparent 70%),
                var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.25rem;
        }

        h1 {
            font-size: clamp(1.9rem, 3.8vw, 4.2rem);
            font-weight: 700;
            line-height: 1.08;
            letter-spacing: -0.025em;
            max-width: 960px;
            font-style: italic; 
            background: linear-gradient(150deg, #ffffff 0%, #cbd5e1 60%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

      h2 {
            font-size: clamp(1rem, 2.5vw, 2.8rem);
            font-weight: 600;
            line-height: 1.18;
            letter-spacing: -0.025em;
            max-width: 650px;
            background: linear-gradient(150deg, #e2e8f0 0%, #94a3b8 60%, #475569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.01em
        }

        .landing-sub {
            margin-top: 1.8rem;
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .scroll-cue {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            color: #94a3b8;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: float 2.4s ease-in-out infinite;
        }

        .scroll-cue svg {
            width: 20px; height: 20px;
            stroke: var(--accent); fill: none; stroke-width: 1.5;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.6; }
            50%       { transform: translateX(-50%) translateY(7px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="section-label">Air Quality Research</div>
    <h1>The air we breath, is the air that the world inhales?</h1>
    <h2>Investigating Global Disparities in Air Quality Analytics</h2>
    <span class="landing-sub">A Data Visualization</span>
    <div class="scroll-cue">
        <span>Scroll to explore</span>
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <script>
        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            window.parent.postMessage({ fpScroll: e.deltaY > 0 ? 'down' : 'up' }, '*');
        }, { passive: false });
    </script>
</body>
</html>
